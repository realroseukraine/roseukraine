<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f3f4f6;
  --surface: rgba(255,255,255,0.38);
  --border: #e2e4e8;
  --text: #33363b;
  --text-soft: #8a8f98;
  --text-softer: #aeb2ba;
  --accent-dark: #3a3d42;
  --radius-lg: 22px;
  --radius-md: 16px;
  --radius-sm: 12px;
  --glass-border: rgba(255,255,255,0.75);
}
body {
  font-family: 'Times New Roman', Times, serif;
  background: linear-gradient(160deg, #dfe3ea 0%, #eef0f3 40%, #d9dde4 100%);
  color: var(--text);
  min-height: 100vh;
}

#header {
  background: linear-gradient(160deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.3) 100%);
  backdrop-filter: blur(20px) saturate(140%);
  -webkit-backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--glass-border);
  box-shadow: inset 0 -1px 0 rgba(255,255,255,0.4);
  padding: 18px 20px;
  position: sticky; top: 0; z-index: 20;
  text-align: center;
}
#header h1 { font-size: 24px; font-weight: 700; letter-spacing: .3px; color: var(--text); }
#header p { font-size: 13px; color: var(--text-soft); margin-top: 4px; }
#tabs {
  display: flex; background: linear-gradient(160deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.22) 100%);
  backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid var(--glass-border); position: sticky; top: 74px; z-index: 20;
}
.tab { flex: 1; min-width: 100px; padding: 13px 6px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text-softer); border-bottom: 2px solid transparent; }
.tab.on { color: var(--text); border-bottom-color: var(--accent-dark); }
#content { padding: 16px; max-width: 960px; margin: 0 auto; }
.view { display: none; } .view.on { display: block; }
.card, .order-item, .batch-box {
  position: relative;
  background: linear-gradient(160deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.22) 45%, rgba(255,255,255,0.32) 100%);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 28px rgba(60,63,68,0.10), inset 0 1px 0 rgba(255,255,255,0.85), inset 0 -1px 0 rgba(255,255,255,0.15);
  overflow: hidden;
}
.card::before, .order-item::before, .batch-box::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 100%);
  pointer-events: none;
}
.card { border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
.card-title { font-weight: 700; font-size: 17px; margin-bottom: 14px; color: var(--text); text-align: center; }
.lbl { font-size: 13px; font-weight: 600; color: var(--text-soft); text-transform: none; letter-spacing: .2px; margin: 12px 0 5px; }
.hint { font-size: 12px; color: var(--text-softer); margin-bottom: 6px; }
input[type=text], textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; outline: none; font-family: inherit; background: rgba(255,255,255,0.7); color: var(--text); }
textarea { resize: vertical; font-family: inherit; font-size: 13px; }
.btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
.btn-primary {
  flex: 1; min-width: 160px; padding: 12px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
  background: linear-gradient(160deg, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.2) 55%, rgba(255,255,255,0.35) 100%);
  backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
  color: var(--text); border: 1px solid var(--glass-border); border-radius: var(--radius-md);
  box-shadow: 0 6px 18px rgba(60,63,68,0.10), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -6px 10px -6px rgba(255,255,255,0.4);
  transition: transform .12s ease, box-shadow .12s ease;
  position: relative; overflow: hidden;
}
.btn-primary:active { transform: scale(0.98); }
.btn-danger {
  padding: 12px 18px; color: #55585e; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit;
  background: linear-gradient(160deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.18) 55%, rgba(255,255,255,0.3) 100%);
  backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
  border: 1px solid var(--glass-border); border-radius: var(--radius-md);
  box-shadow: 0 6px 18px rgba(60,63,68,0.08), inset 0 1px 0 rgba(255,255,255,0.85);
  position: relative; overflow: hidden;
}
.btn-danger.confirming { background: rgba(58,61,66,0.88); color: #fff; border-color: rgba(58,61,66,0.88); }
.order-item { border-radius: var(--radius-lg); padding: 16px; margin-bottom: 10px; }
.order-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
.order-name { font-weight: 700; font-size: 16px; color: var(--text); }
.del-btn { background: linear-gradient(160deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%); backdrop-filter: blur(12px) saturate(140%); -webkit-backdrop-filter: blur(12px) saturate(140%); color: #55585e; border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer; font-size: 12px; font-family: inherit; box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); }
.edit-btn { background: linear-gradient(160deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%); backdrop-filter: blur(12px) saturate(140%); -webkit-backdrop-filter: blur(12px) saturate(140%); color: var(--accent-dark); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 600; box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: linear-gradient(160deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.25) 100%); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 13px; color: var(--text); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); }
.empty { text-align: center; color: var(--text-softer); padding: 60px 20px; font-size: 14px; }
.batch { margin-bottom: 24px; }
.batch-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
.batch-title { font-weight: 700; font-size: 16px; color: var(--text); }
.exp-btn {
  padding: 8px 16px; color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  background: linear-gradient(160deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 100%);
  backdrop-filter: blur(14px) saturate(140%); -webkit-backdrop-filter: blur(14px) saturate(140%);
  border: 1px solid var(--glass-border); border-radius: var(--radius-md);
  box-shadow: 0 4px 14px rgba(60,63,68,0.08), inset 0 1px 0 rgba(255,255,255,0.85);
}
.batch-box { border-radius: var(--radius-lg); padding: 16px; overflow-x: auto; }
.client-block { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.client-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

<body>

<div id="tabs">

  <button style="margin-left:auto;flex:none;align-self:center;margin-right:10px;padding:5px 10px;font-family:inherit;font-size:11px;font-weight:500;color:var(--text-softer);background:transparent;border:1px solid var(--border);border-radius:8px;cursor:pointer" onclick="toggleSharedTab()" id="toggleSharedBtn">Спільні замовлення</button>

<div id="content">

    <button class="mbtn msec" onclick="closeModal()">Закрити</button>

<script>
var BATCH = 9999;
var orders = [];
var clearArmed = false;
var pngUrl = null;
var tableMode = 'bySort';
var sharedTableMode = 'bySort';
var sharedTabVisible = false;
var idCounter = 1;
var dugSorts = {}; // key: sort name lowercase -> true if marked as dug up

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function parseItems(text, clientName) {
  var rawLines = text.split('\n');
  var items = [];
  // Two ways to mark the start of a new recipient within this same order:
  //   1. "#Ім'я" — explicit, always wins.
  //   2. A bare name on its own line (no "#") — recognized automatically when
  //      the line looks like a name: 1–3 capitalized words, no digits, no
  //      qty separators (- x × *), AND the line right after it contains a
  //      digit (i.e. it's followed by an actual sort+quantity, not another
  //      sort-without-quantity). That guard keeps a stray sort name typed
  //      without a quantity from being mistaken for a recipient.
  // Sorts before any recipient marker have no recipient (kept as before, so
  // existing orders are unaffected). A marker that just repeats the client's
  // own name (e.g. "#ПІБ" or bare "ПІБ" when the client is named "ПІБ") is
  // treated as "no recipient" too, since that's the main client, not someone else.
  var currentRecipient = '';
  var clientNameLower = (clientName || '').trim().toLowerCase();
  // Each word: starts with a capital letter, followed by any mix of letters
  // (so both "Мама" and all-caps abbreviations like "ПІБ" match).
  var bareNameRe = /^[А-ЯҐЄІЇA-Z][А-Яа-яҐґЄєІіЇїA-Za-z'’ʼ-]*(\s+[А-ЯҐЄІЇA-Z][А-Яа-яҐґЄєІіЇїA-Za-z'’ʼ-]*){0,2}$/;
  var hasQtySeparator = /[\d\-\u2013\u2014x\xd7*]/;

  for (var i = 0; i < rawLines.length; i++) {
    var line = rawLines[i].trim();
    if (!line) continue;

    var recMatch = line.match(/^#\s*(.+)$/);
    var bareRecName = null;
    if (!recMatch && bareNameRe.test(line) && !hasQtySeparator.test(line)) {
      // A line that's just the client's own name always resets to "no
      // recipient" (Собі), even at the very end of the text with nothing
      // after it — it can never sensibly be a sort name for this client.
      if (clientNameLower && line.toLowerCase() === clientNameLower) {
        bareRecName = line;
      } else {
        // Otherwise, only treat this as a recipient name if the next
        // non-empty line actually contains a digit (a real "sort qty" line).
        for (var la = i + 1; la < rawLines.length; la++) {
          var nextLine = rawLines[la].trim();
          if (!nextLine) continue;
          if (/\d/.test(nextLine)) bareRecName = line;
          break;
        }
      }
    }

    if (recMatch || bareRecName) {
      var recName = (recMatch ? recMatch[1] : bareRecName).trim();
      currentRecipient = (clientNameLower && recName.toLowerCase() === clientNameLower) ? '' : recName;
      continue;
    }

    // Split on commas/semicolons first (handles "Sort1 - 10, Sort2 - 15").
    // Then also split remaining multi-sort chunks on whitespace-separated "name qty" runs.
    var segments = line.split(/[,;]+/);
    var found = [];
    for (var s = 0; s < segments.length; s++) {
      var seg = segments[s].trim();
      if (!seg) continue;

      // "Набір" detection: the word "Набір" appears with no specific sort name
      // attached — e.g. "Набір 20", "набір - 10", "Набір з 50 саджанців троянд",
      // or just a bare number like "20". Anything starting with "набір" is a
      // generic set (fulfiller picks any saplings). The full text the person
      // typed (e.g. "Набір з 20 саджанців троянд") is kept as the item name,
      // instead of collapsing it down to just the word "Набір" — but it must
      // still never land in the by-sort table, only in orders/clients/shipping.
      var setMatch = seg.match(/^(набір[^\d]*)(\d+)(.*)$/i);
      if (setMatch) {
        var setLabel = (setMatch[1] + setMatch[2] + setMatch[3]).trim();
        found.push({name: setLabel, qty: parseInt(setMatch[2]), kind: 'set'});
        continue;
      }
      var bareNum = seg.match(/^(\d+)\s*$/);
      if (bareNum) {
        found.push({name: 'Набір', qty: parseInt(bareNum[1]), kind: 'set'});
        continue;
      }

      // Within a segment, repeatedly peel off "name qty" pairs from the front,
      // to support "Sort1 10 Sort2 15" without commas.
      var rest = seg;
      var guard = 0;
      while (rest.length && guard < 20) {
        guard++;
        var mm = rest.match(/^([^\d\-\u2013\u2014x\xd7*][^\d]*?)\s*[-\u2013\u2014x\xd7*]?\s*(\d+)(?:\s+|$)/i);
        if (!mm) break;
        var nm = mm[1].trim().replace(/^[-\u2013\u2014]+/, '').replace(/[-\u2013\u2014]+$/, '').trim();
        if (nm.length) found.push({name: nm, qty: parseInt(mm[2])});
        rest = rest.slice(mm[0].length).trim();
      }
      if (!found.length && seg.length > 1 && !/\d/.test(seg)) {
        found.push({name: seg, qty: 1});
      }
    }
    for (var f = 0; f < found.length; f++) {
      if (currentRecipient) found[f].recipient = currentRecipient;
      items.push(found[f]);
    }
  }

  // Sort: recipient groups stay together in the order they appeared, and
  // within each group regular sorts come before "Набір" entries, alphabetically.
  var recipientOrder = [];
  items.forEach(function(it) {
    var r = it.recipient || '';
    if (recipientOrder.indexOf(r) === -1) recipientOrder.push(r);
  });
  items.sort(function(a, b) {
    var ra = recipientOrder.indexOf(a.recipient || '');
    var rb = recipientOrder.indexOf(b.recipient || '');
    if (ra !== rb) return ra - rb;
    var aSet = a.kind === 'set', bSet = b.kind === 'set';
    if (aSet !== bSet) return aSet ? 1 : -1;
    return a.name.localeCompare(b.name, 'uk');
  });
  return items;
}

function addOrder() {
  var name = document.getElementById('inName').value.trim();
  var text = document.getElementById('inText').value.trim();
  var note = document.getElementById('inNote').value.trim();
  if (!name || !text) { alert('Заповни ПІБ клієнта і список сортів'); return; }
  var items = parseItems(text, name);
  if (!items.length) { alert('Не вдалося розпізнати сорти. Перевір формат.'); return; }
  orders.push({id: idCounter++, name: name, items: items, sum: '', phone: '', address: '', note: note});
  orders.sort(function(a, b) { return a.name.localeCompare(b.name, 'uk'); });
  document.getElementById('inName').value = '';
  document.getElementById('inText').value = '';
  document.getElementById('inNote').value = '';
  renderAll();
}

function handleClear() {
  var btn = document.getElementById('clearBtn');
  if (orders.length === 0) return;
  if (!clearArmed) {
    clearArmed = true;
    btn.textContent = 'Натисніть ще раз для підтвердження';
    btn.classList.add('confirming');
    setTimeout(function() {
      if (clearArmed) {
        clearArmed = false;
        btn.textContent = 'Стерти всі замовлення';
        btn.classList.remove('confirming');
      }
    }, 3000);
  } else {
    orders = [];
    dugSorts = {};
    clearArmed = false;
    btn.textContent = 'Стерти всі замовлення';
    btn.classList.remove('confirming');
    renderAll();
  }
}

function removeOrder(id) {
  orders = orders.filter(function(o) { return o.id !== id; });
  renderAll();
}

function updateField(id, field, value) {
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].id === id) { orders[i][field] = value; break; }
  }
  if (field === 'sum') {
    updateTotals();
    var els = document.querySelectorAll('[data-sum-for="' + id + '"]');
    for (var j = 0; j < els.length; j++) { if (els[j].value !== value) els[j].value = value; }
  }
  scheduleSave();
}

function updateQty(id, idx, val) {
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].id === id) {
      orders[i].items[idx].qty = val === '' ? 0 : (parseInt(val) || 0);
      var sum = orders[i].items.reduce(function(a,b){ return a+(parseInt(b.qty)||0); }, 0);
      var el = document.querySelector('[data-qtysum="' + id + '"]');
      if (el) el.textContent = sum;
      break;
    }
  }
  scheduleSave();
}

function updateSharedTabButton() {
  var tabBtn = document.getElementById('tab-shared');
  var toggleBtn = document.getElementById('toggleSharedBtn');
  if (tabBtn) tabBtn.style.display = sharedTabVisible ? '' : 'none';
  if (toggleBtn) toggleBtn.textContent = sharedTabVisible ? 'Спільні замовлення ✓' : 'Спільні замовлення';
}

function toggleSharedTab() {
  sharedTabVisible = !sharedTabVisible;
  updateSharedTabButton();
  if (!sharedTabVisible) {
    // if we're currently on the tab being hidden, fall back to the main table
    var v = document.getElementById('v-shared');
    if (v && v.classList.contains('on')) switchTab('table');
  }
  scheduleSave();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(function(b) {
    b.classList.toggle('on', b.getAttribute('onclick') === "switchTab('" + t + "')");
  });
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('on'); });
  document.getElementById('v-' + t).classList.add('on');
  if (t === 'table') renderTable();
  if (t === 'shared') renderSharedTable();
  if (t === 'shipping') renderShipping();
}

function getBatches() {
  var b = [];
  for (var i = 0; i < orders.length; i += BATCH) b.push(orders.slice(i, i + BATCH));
  return b;
}

function renderAll() {
  document.getElementById('headStats').textContent = orders.length + ' замовлень';
  updateSharedTabButton();
  renderOrderList();
  renderTable();
  renderSharedTable();
  renderShipping();
  scheduleSave();
}

// ---- Firestore sync ----
var STATE_DOC = db.collection('rose-orders').doc('state');
var saveTimer = null;
var isLoading = true;
var localVersion = 0;   // increments every time we make a local change
var savedVersion = 0;   // the localVersion that has actually been written to Firestore
var lastWriteId = 0;    // unique id for our own writes, to recognize our own snapshot echoes
var writeInFlight = false;      // true from the moment a write is sent until it resolves
var pendingAfterFlight = false; // a new local change arrived while a write was in flight

function scheduleSave() {
  if (isLoading) return; // don't save while we're still loading initial data
  localVersion++;
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSaveNow, 600);
}

function setSaveStatus(text, color) {
  var el = document.getElementById('saveStatus');
  if (el) { el.textContent = text; el.style.color = color || '#999'; }
}

function doSaveNow() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }

  // Never let two writes be in flight to Firestore at the same time. If one
  // is already on its way, just note that more changes came in and flush
  // them the moment the current write resolves. This removes any dependence
  // on which network response happens to come back first, which was the
  // actual cause of the "disappearing checkmark" bug.
  if (writeInFlight) { pendingAfterFlight = true; return; }

  writeInFlight = true;
  var versionAtSaveTime = localVersion;
  var writeId = ++lastWriteId;
  setSaveStatus('Зберігається...', '#999');
  STATE_DOC.set({
    orders: orders,
    idCounter: idCounter,
    dugSorts: dugSorts,
    sharedTabVisible: sharedTabVisible,
    writeId: writeId,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function() {
    savedVersion = versionAtSaveTime;
    writeInFlight = false;
    setSaveStatus('✓ Збережено на сайті', '#3a9c5a');
    if (pendingAfterFlight) {
      pendingAfterFlight = false;
      doSaveNow(); // flush whatever changed while we were writing
    }
  }).catch(function(e) {
    console.error('Save failed:', e);
    writeInFlight = false;
    setSaveStatus('❌ Не вдалося зберегти — перевір інтернет і натисни «Зберегти дані на сайті»', '#4a4d52');
    if (pendingAfterFlight) {
      pendingAfterFlight = false;
      doSaveNow();
    }
  });
}

// Flush any pending save immediately (e.g. before leaving the page / switching tabs)
function flushSave() {
  if (saveTimer) { doSaveNow(); }
}

// Explicit manual save button — forces an immediate write regardless of the
// debounce timer, and reports success/failure so it's never a guessing game.
function manualSave() {
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
  localVersion++;
  doSaveNow();
}

function loadState() {
  setSaveStatus('Завантаження даних із сайту...', '#999');
  STATE_DOC.get().then(function(doc) {
    if (doc.exists) {
      var data = doc.data();
      orders = data.orders || [];
      idCounter = data.idCounter || 1;
      dugSorts = data.dugSorts || {};
      sharedTabVisible = !!data.sharedTabVisible;
      lastWriteId = data.writeId || 0;
    }
    isLoading = false;
    renderAll();
    setSaveStatus('✓ Дані завантажено з сайту', '#3a9c5a');
  }).catch(function(e) {
    console.error('Load failed:', e);
    isLoading = false;
    renderAll();
    setSaveStatus('❌ Не вдалося завантажити дані з сайту — перевір інтернет-з\'єднання', '#4a4d52');
  });

  // Live sync: if data changes elsewhere (another device), update here too.
  STATE_DOC.onSnapshot(function(doc) {
    if (!doc.exists) return;
    if (isLoading) return;

    // If we have local changes that haven't been confirmed as saved yet
    // (still waiting on the 600ms debounce, a write is currently in flight,
    // or a write finished but another change is queued behind it), do NOT
    // let this snapshot overwrite them — it may be stale data from before
    // our latest edit (this is what caused clients to "disappear").
    if (saveTimer || writeInFlight || pendingAfterFlight || localVersion !== savedVersion) return;

    var data = doc.data();

    // Also ignore the echo of our own most recent write.
    if (data.writeId && data.writeId === lastWriteId) return;

    orders = data.orders || [];
    idCounter = data.idCounter || 1;
    dugSorts = data.dugSorts || {};
    sharedTabVisible = !!data.sharedTabVisible;
    lastWriteId = data.writeId || lastWriteId;
    var wasLoading = isLoading;
    isLoading = true; // prevent this render from re-triggering a save
    renderOrderList();
    renderTable();
    renderShipping();
    document.getElementById('headStats').textContent = orders.length + ' замовлень';
    isLoading = wasLoading;
  });
}

// Save immediately when the page is hidden/closed, so nothing is lost
// if the phone locks or the browser tab closes right after typing.
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') flushSave();
});
window.addEventListener('pagehide', flushSave);


var editingOrderId = null;

function itemsToText(items) {
  var lines = [];
  var lastRecipient = undefined; // undefined = not started yet, so first "no recipient" group won't print a stray header
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var r = it.recipient || '';
    if (r !== lastRecipient) {
      if (r) lines.push('#' + r);
      lastRecipient = r;
    }
    lines.push(it.name + ' ' + it.qty);
  }
  return lines.join('\n');
}

function renderOrderList() {
  var wrap = document.getElementById('orderList');
  if (!orders.length) { wrap.innerHTML = '<div class="empty">Замовлень ще немає</div>'; return; }
  var html = '';
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    var isEditing = editingOrderId === o.id;
    html += '<div class="order-item">' +
      '<div class="order-head"><div class="order-name">#' + (i+1) + ' ' + esc(o.name) + '</div>' +
      '<div style="display:flex;gap:6px">' +
      '<button class="edit-btn" onclick="' + (isEditing ? 'cancelEditOrder()' : 'startEditOrder(' + o.id + ')') + '">' + (isEditing ? 'Скасувати' : '✎ Редагувати') + '</button>' +
      '<button class="del-btn" onclick="removeOrder(' + o.id + ')">✕</button></div></div>';
    if (isEditing) {
      html += '<div class="lbl" style="margin-top:4px">Список сортів</div>' +
        '<textarea id="editText" rows="6">' + esc(itemsToText(o.items)) + '</textarea>' +
        '<div class="lbl">Примітка</div>' +
        '<textarea id="editNote" rows="2">' + esc(o.note || '') + '</textarea>' +
        '<div class="btn-row"><button class="btn-primary" onclick="saveEditOrder(' + o.id + ')">✓ Зберегти замовлення</button></div>';
    } else {
      html += renderItemChips(o.items, o.name);
      if (o.note) html += '<div style="margin-top:8px;font-size:13px;color:#666;background:#fbf8ee;border:1px solid #ede4c8;border-radius:7px;padding:8px 10px">📝 ' + esc(o.note) + '</div>';
    }
    html += '</div>';
  }
  wrap.innerHTML = html;
}

// Renders item chips, grouped under a recipient sub-heading when an order
// has been split between multiple people (e.g. the client's own name / "Мамі")
// via "#" lines. Falls back to a single flat chip list when no recipients are
// set, so plain orders look exactly as before. The client's own portion (no
// recipient tag) is labelled with their actual name rather than a placeholder.
function renderItemChips(items, clientName) {
  var hasRecipients = items.some(function(it) { return it.recipient; });
  if (!hasRecipients) {
    var html = '<div class="chips">';
    for (var j = 0; j < items.length; j++) {
      html += '<span class="chip">' + esc(items[j].name) + ' <strong>×' + items[j].qty + '</strong></span>';
    }
    return html + '</div>';
  }
  var groups = [];
  var byName = {};
  for (var i = 0; i < items.length; i++) {
    var r = items[i].recipient || (clientName || 'Клієнт');
    if (!byName[r]) { byName[r] = []; groups.push(r); }
    byName[r].push(items[i]);
  }
  var out = '';
  for (var g = 0; g < groups.length; g++) {
    var rname = groups[g];
    out += '<div style="margin-top:8px"><div style="font-size:12px;font-weight:700;color:#888;margin-bottom:4px">👤 ' + esc(rname) + '</div><div class="chips">';
    for (var k = 0; k < byName[rname].length; k++) {
      out += '<span class="chip">' + esc(byName[rname][k].name) + ' <strong>×' + byName[rname][k].qty + '</strong></span>';
    }
    out += '</div></div>';
  }
  return out;
}

function startEditOrder(id) {
  editingOrderId = id;
  renderOrderList();
}

function cancelEditOrder() {
  editingOrderId = null;
  renderOrderList();
}

function saveEditOrder(id) {
  var text = document.getElementById('editText').value.trim();
  var note = document.getElementById('editNote').value.trim();
  var clientName = '';
  for (var i = 0; i < orders.length; i++) {
    if (orders[i].id === id) { clientName = orders[i].name; break; }
  }
  var items = parseItems(text, clientName);
  if (!items.length) { alert('Список сортів порожній. Перевір формат.'); return; }
  for (var i2 = 0; i2 < orders.length; i2++) {
    if (orders[i2].id === id) { orders[i2].items = items; orders[i2].note = note; break; }
  }
  editingOrderId = null;
  renderAll();
}


function toggleDugCell(cellKey) {
  dugSorts[cellKey] = !dugSorts[cellKey];
  var sharedView = document.getElementById('v-shared');
  if (sharedView && sharedView.classList.contains('on')) {
    renderSharedTable();
  } else {
    renderTable();
  }
  scheduleSave();
}

function filterSortTable(query, scope) {
  var q = query.trim().toLowerCase();
  var selector = scope ? '#v-' + (scope === 'tbl-shared' ? 'shared' : 'table') + ' .sort-tbl tbody tr[data-sortname]' : '.sort-tbl tbody tr[data-sortname]';
  var rows = document.querySelectorAll(selector);
  rows.forEach(function(row) {
    var name = row.getAttribute('data-sortname');
    row.style.display = (!q || name.indexOf(q) !== -1) ? '' : 'none';
  });
}

function setTableMode(mode) {
  tableMode = mode;
  renderTable();
}

function setSharedTableMode(mode) {
  sharedTableMode = mode;
  renderSharedTable();
}

function isSharedOrder(o) {
  return o.items.some(function(it){ return !!it.recipient; });
}

// A client whose entire order is just a "Набір" (a set of saplings, the
// grower's own choice — no specific sorts requested) is left out of
// "Таблиця замовлень" only. They still show up everywhere else (order list,
// shared table, shipping) since those views are unaffected by this rule.
function isSetItem(it) {
  return it.kind === 'set' || it.name.trim().toLowerCase().indexOf('набір') === 0;
}
function isOnlySetOrder(o) {
  return o.items.length > 0 && o.items.every(isSetItem);
}

function renderTable() {
  var view = document.getElementById('v-table');
  var subset = orders.filter(function(o){ return !isSharedOrder(o) && !isOnlySetOrder(o); });
  renderTableInto(view, subset, tableMode, 'setTableMode', 'tbl');
}

function renderSharedTable() {
  var view = document.getElementById('v-shared');
  if (!view) return;
  var subset = orders.filter(isSharedOrder);
  renderTableInto(view, subset, sharedTableMode, 'setSharedTableMode', 'tbl-shared');
}

function renderTableInto(view, orderSubset, mode, modeSetterName, idPrefix) {
  if (!orderSubset.length) { view.innerHTML = '<div class="empty">' + (idPrefix === 'tbl-shared' ? 'Спочатку додайте замовлення зі спільними одержувачами у вкладці «Замовлення»' : 'Спочатку додайте замовлення у вкладці «Замовлення»') + '</div>'; return; }
  var batches = [];
  for (var i = 0; i < orderSubset.length; i += BATCH) batches.push(orderSubset.slice(i, i + BATCH));

  var html = '<div class="toggle-btns">' +
    '<button style="background:' + (mode==='bySort'?'#111':'#f0f0f0') + ';color:' + (mode==='bySort'?'#fff':'#555') + '" onclick="' + modeSetterName + '(\'bySort\')">Таблиця замовлень</button>' +
    '<button style="background:' + (mode==='byClient'?'#111':'#f0f0f0') + ';color:' + (mode==='byClient'?'#fff':'#555') + '" onclick="' + modeSetterName + '(\'byClient\')">Список клієнтів</button>' +
  '</div>';

  for (var bi = 0; bi < batches.length; bi++) {
    var batch = batches[bi];
    var isLast = bi === batches.length - 1;
    var batchLabel = batches.length > 1 ? 'Таблиця ' + (bi+1) + ' — клієнти ' + (bi*BATCH+1) + '–' + Math.min(bi*BATCH+BATCH, orderSubset.length) : '';
    var expId = mode === 'byClient' ? idPrefix + '-client-' + bi : idPrefix + '-sort-' + bi;
    var expFile = mode === 'byClient' ? 'таблиця-' + (bi+1) + '.png' : 'таблиця-сорти-' + (bi+1) + '.png';

    html += '<div class="batch"><div class="batch-head">' +
      '<div class="batch-title">' + batchLabel + '</div>' +
      '<button class="exp-btn" onclick="exportEl(\'' + expId + '\',\'' + expFile + '\')">⬇ PNG</button>' +
    '</div>';

    if (mode === 'byClient') {
      html += '<div class="batch-box" id="' + expId + '">';
      for (var oi = 0; oi < batch.length; oi++) {
        var o = batch[oi];
        var qtySum = o.items.reduce(function(a,b){ return a+(parseInt(b.qty)||0); }, 0);
        var hasRec = o.items.some(function(it){ return it.recipient; });
        html += '<div class="client-block"><div class="client-row">' +
          '<div class="client-name">' + esc(o.name) + '</div>' +
          '<div class="client-meta">' +
            '<span>Загальна кількість: <strong data-qtysum="' + o.id + '">' + qtySum + '</strong></span>' +
            '<span>Сума: <input class="sum-input" data-sum-for="' + o.id + '" value="' + esc(o.sum) + '" placeholder="0" oninput="updateField(' + o.id + ',\'sum\',this.value)"> грн</span>' +
          '</div></div>' +
          '<table><thead><tr>' + (hasRec ? '<th style="width:110px">Отримувач</th>' : '') + '<th>Назва сорту</th><th style="text-align:center;width:90px">Кількість</th></tr></thead><tbody>';
        for (var ii = 0; ii < o.items.length; ii++) {
          html += '<tr>' + (hasRec ? '<td style="color:#888;font-size:13px">' + esc(o.items[ii].recipient || o.name) + '</td>' : '') + '<td>' + esc(o.items[ii].name) + '</td><td style="text-align:center">' +
            '<input type="number" class="qty-input" value="' + o.items[ii].qty + '" oninput="updateQty(' + o.id + ',' + ii + ',this.value)"></td></tr>';
        }
        html += '</tbody></table></div>';
      }
      if (isLast) html += '<div class="total-bar"><span>Загальна сума усіх замовлень</span><span class="val" data-totals-scope="' + idPrefix + '">0 грн</span></div>';
      html += '</div>';

    } else {
      // Build columns: one per client (their own "Собі" items), plus one
      // extra column per named recipient (e.g. "Мати") within that client's
      // order. Columns are flat, not grouped/labelled by client — each just
      // carries its own header (client name, or the recipient's name).
      var columns = [];
      for (var oi2 = 0; oi2 < batch.length; oi2++) {
        var o2 = batch[oi2];
        var recipientNames = [];
        o2.items.forEach(function(it){
          if (it.recipient && recipientNames.indexOf(it.recipient) === -1) recipientNames.push(it.recipient);
        });
        columns.push({ clientId: o2.id, label: o2.name, recipient: null, order: o2 });
        recipientNames.forEach(function(rn){
          columns.push({ clientId: o2.id, label: rn, recipient: rn, order: o2 });
        });
      }

      // Build sorts map, keyed by column index rather than just client id,
      // so a "Собі" column and a named-recipient column for the same client
      // get their own separate numbers.
      var sortsMap = {};
      for (var colI = 0; colI < columns.length; colI++) {
        var col = columns[colI];
        for (var ii2 = 0; ii2 < col.order.items.length; ii2++) {
          var it = col.order.items[ii2];
          // Skip "Набір" entries: they're not tied to a specific sort. Check both
          // the kind flag (new entries) and the name itself (older saved entries
          // from before this flag existed still say "Набір" but have no kind).
          if (isSetItem(it)) continue;
          var itRecipient = it.recipient || null;
          if (itRecipient !== col.recipient) continue;
          var key = it.name.toLowerCase().trim();
          if (!sortsMap[key]) sortsMap[key] = {name: it.name, byCol: {}};
          sortsMap[key].byCol[colI] = (sortsMap[key].byCol[colI] || 0) + (parseInt(it.qty) || 0);
        }
      }
      var sorts = Object.values(sortsMap).sort(function(a,b){ return a.name.localeCompare(b.name,'uk'); });

      if (isLast || batches.length === 1) {
        html += '<input type="text" class="cell-input sortSearchInput" data-scope="' + idPrefix + '" placeholder="Пошук сорту..." oninput="filterSortTable(this.value, \'' + idPrefix + '\')" style="margin-bottom:12px;max-width:280px">';
      }
      html += '<div style="overflow:hidden;background:#fff;border:1px solid #e5e5e5;border-radius:10px" id="' + expId + '"><div style="overflow-x:auto;padding:16px">';
      html += '<table class="sort-tbl"><thead><tr>';
      html += '<th class="name-col">Назва сорту</th>';
      for (var ci = 0; ci < columns.length; ci++) {
        html += '<th>' + esc(columns[ci].label) + '</th>';
      }
      html += '<th style="background:#333">Всього</th></tr></thead><tbody>';

      for (var si = 0; si < sorts.length; si++) {
        var s = sorts[si];
        var rowQtys = columns.map(function(c, idx){ return s.byCol[idx] || 0; });
        var total = rowQtys.reduce(function(a,b){ return a+b; }, 0);
        var repeated = rowQtys.filter(function(q){ return q > 0; }).length > 1;
        var sortKey = s.name.toLowerCase().trim();
        var rowAllDug = rowQtys.every(function(q, idx){ return q === 0 || !!dugSorts[sortKey + '|' + columns[idx].clientId + (columns[idx].recipient ? '|' + columns[idx].recipient : '')]; });
        html += '<tr data-sortname="' + esc(sortKey) + '" style="background:' + (si%2===0?'#fff':'#f9f9f9') + '">';
        html += '<td class="name-col" style="font-weight:' + (repeated?'700':'400') + ';text-decoration:' + (rowAllDug?'line-through':'none') + ';color:' + (rowAllDug?'#5a9c6a':'#222') + '">' + (rowAllDug?'✓ ':(repeated?'⚡ ':'')) + esc(s.name) + '</td>';
        for (var ri = 0; ri < rowQtys.length; ri++) {
          var cellKey = sortKey + '|' + columns[ri].clientId + (columns[ri].recipient ? '|' + columns[ri].recipient : '');
          var cellDug = rowQtys[ri] > 0 && !!dugSorts[cellKey];
          var clickable = rowQtys[ri] > 0;
          html += '<td' + (clickable ? ' onclick="toggleDugCell(\'' + esc(cellKey).replace(/'/g,"\\'") + '\')" style="cursor:pointer;' : ' style="') +
            'text-decoration:' + (cellDug?'line-through':'none') + ';color:' + (cellDug?'#5a9c6a':'#111') + ';font-weight:' + (rowQtys[ri]>0?'700':'400') + ';background:' + (cellDug?'#eafaea':'transparent') + '">' + (cellDug?'✓ ':'') + (rowQtys[ri]>0?rowQtys[ri]:'') + '</td>';
        }
        html += '<td style="font-weight:700;background:' + (rowAllDug?'#dcf3dc':'#f5f5f5') + ';text-decoration:' + (rowAllDug?'line-through':'none') + '">' + total + '</td></tr>';
      }

      // Razom row
      html += '<tr class="razom"><td class="name-col">Разом</td>';
      for (var ci2 = 0; ci2 < columns.length; ci2++) {
        var colTotal = columns[ci2].order.items.reduce(function(a,b){
          var itRec = b.recipient || null;
          if (itRec !== columns[ci2].recipient) return a;
          return a+(parseInt(b.qty)||0);
        }, 0);
        html += '<td>' + colTotal + '</td>';
      }
      var grandTotal = sorts.reduce(function(a,s){ return a+Object.values(s.byCol).reduce(function(x,y){return x+y;},0); }, 0);
      html += '<td style="background:#e0e0e0">' + grandTotal + '</td></tr>';
      html += '</tbody></table></div>';
      if (isLast) html += '<div class="total-bar"><span>Загальна сума усіх замовлень</span><span class="val" data-totals-scope="' + idPrefix + '">0 грн</span></div>';
      html += '</div>';
    }

    html += '</div>';
  }

  view.innerHTML = html;
  updateTotals();
}

function renderShipping() {
  var view = document.getElementById('v-shipping');
  if (!orders.length) { view.innerHTML = '<div class="empty">Спочатку додайте замовлення у вкладці «Замовлення»</div>'; return; }
  var batches = getBatches();
  var html = '';

  for (var bi = 0; bi < batches.length; bi++) {
    var batch = batches[bi];
    var isLast = bi === batches.length - 1;
    var batchLabel = batches.length > 1 ? 'Відправлення ' + (bi+1) + ' — клієнти ' + (bi*BATCH+1) + '–' + Math.min(bi*BATCH+BATCH, orders.length) : '';

    html += '<div class="batch"><div class="batch-head">' +
      '<div class="batch-title">' + batchLabel + '</div>' +
      '<button class="exp-btn" onclick="exportEl(\'ship-' + bi + '\',\'відправлення-' + (bi+1) + '.png\')">⬇ PNG</button>' +
    '</div>' +
    '<div id="ship-' + bi + '" style="background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden">' +
    '<div style="overflow-x:auto">' +
    '<table style="width:100%;border-collapse:collapse;font-size:13px">' +
    '<thead><tr style="background:#f7f7f7">' +
      '<th style="padding:8px 10px;border-bottom:1px solid #eee;text-align:left">ПІБ клієнта</th>' +
      '<th style="padding:8px 10px;border-bottom:1px solid #eee;text-align:left">Номер телефону</th>' +
      '<th style="padding:8px 10px;border-bottom:1px solid #eee;text-align:left">Адреса для відправлення</th>' +
      '<th style="padding:8px 10px;border-bottom:1px solid #eee;text-align:left;width:110px">Сума</th>' +
    '</tr></thead><tbody>';

    for (var oi = 0; oi < batch.length; oi++) {
      var o = batch[oi];
      html += '<tr>' +
        '<td style="padding:7px 10px;border-bottom:1px solid #f5f5f5">' + esc(o.name) + '</td>' +
        '<td style="padding:7px 10px;border-bottom:1px solid #f5f5f5"><input class="cell-input" value="' + esc(o.phone) + '" placeholder="+380" oninput="updateField(' + o.id + ',\'phone\',this.value)"></td>' +
        '<td style="padding:7px 10px;border-bottom:1px solid #f5f5f5"><textarea class="addr-input" rows="1" placeholder="Область, Місто / Селище, Відділення" oninput="updateField(' + o.id + ',\'address\',this.value);autoGrow(this)" onfocus="autoGrow(this)">' + esc(o.address) + '</textarea></td>' +
        '<td style="padding:7px 10px;border-bottom:1px solid #f5f5f5"><input class="cell-input" data-sum-for="' + o.id + '" value="' + esc(o.sum) + '" placeholder="0" oninput="updateField(' + o.id + ',\'sum\',this.value)"> грн</td>' +
      '</tr>';
    }

    html += '</tbody></table></div>';
    if (isLast) html += '<div class="total-bar" style="border-radius:0 0 10px 10px;margin:0"><span>Загальна сума усіх замовлень</span><span class="val" id="totalValShip">0 грн</span></div>';
    html += '</div></div>';
  }

  view.innerHTML = html;
  updateTotals();
  view.querySelectorAll('.addr-input').forEach(autoGrow);
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight) + 'px';
}

function updateTotals() {
  var total = orders.reduce(function(acc,o){ return acc + (parseFloat(o.sum)||0); }, 0);
  var str = total.toLocaleString('uk-UA') + ' грн';
  document.querySelectorAll('[data-totals-scope]').forEach(function(el){ el.textContent = str; });
  var t2 = document.getElementById('totalValShip');
  if (t2) t2.textContent = str;
}

async function exportEl(elId, filename) {
  var el = document.getElementById(elId);
  if (!el) return;
  document.getElementById('modal').classList.add('show');
  document.getElementById('mtxt').textContent = 'Генерується зображення...';
  document.getElementById('mimg').style.display = 'none';
  document.getElementById('msave').style.display = 'none';
  pngUrl = null;

  if (typeof html2canvas === 'undefined') {
    document.getElementById('mtxt').textContent = '❌ Не вдалося завантажити бібліотеку для створення зображення. Перевір інтернет-з\'єднання і онови сторінку.';
    return;
  }

  // Replace inputs with divs for clean render
  var inputs = el.querySelectorAll('input, textarea');
  var saved = [];
  inputs.forEach(function(inp) {
    var div = document.createElement('div');
    div.textContent = inp.value || '';
    var cs = window.getComputedStyle(inp);
    div.style.cssText = 'border:1px solid #ddd;border-radius:6px;padding:5px 7px;font-size:' + cs.fontSize + ';font-family:inherit;color:#222;background:#fff;min-height:' + inp.offsetHeight + 'px;display:flex;align-items:center;box-sizing:border-box;width:' + inp.offsetWidth + 'px';
    saved.push({inp: inp, parent: inp.parentNode, next: inp.nextSibling, div: div});
    inp.parentNode.replaceChild(div, inp);
  });

  try {
    var canvas = await html2canvas(el, {scale:2, useCORS:true, backgroundColor:'#ffffff', logging:false});
    pngUrl = canvas.toDataURL('image/png');
    window._expFilename = filename;
    var mi = document.getElementById('mimg');
    mi.src = pngUrl; mi.style.display = 'block';
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    document.getElementById('mtxt').textContent = isIOS ? '✅ Утримуй фото пальцем → «Зберегти фото»' : '✅ Готово!';
    document.getElementById('msave').style.display = isIOS ? 'none' : 'block';
  } catch(e) {
    document.getElementById('mtxt').textContent = '❌ Помилка: ' + e.message;
  }

  // Restore inputs
  saved.forEach(function(s) {
    s.div.parentNode.replaceChild(s.inp, s.div);
  });
}

function doSave() {
  if (!pngUrl) return;
  var a = document.createElement('a');
  a.href = pngUrl;
  a.download = window._expFilename || 'таблиця.png';
  a.click();
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  pngUrl = null;
}

loadState();
</script>
